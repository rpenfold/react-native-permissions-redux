name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Lint
        run: npx biome check .

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify NPM_TOKEN
        run: |
          if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
            echo "::error::NPM_TOKEN is not set. Add an npm automation token under Settings → Secrets and variables → Actions, then re-run this workflow."
            exit 1
          fi

      - name: Publish
        # --ignore-scripts: skip "prepare" (husky) on the publish machine
        run: npm publish --provenance --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
